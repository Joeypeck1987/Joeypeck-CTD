<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eidolon Sleep - HTML/CSS Recreation</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      font-family: Georgia, "Times New Roman", serif;
    }

      /* entry link */
    .entry-link {
      display: block;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    .poster {
      position: relative;
      width: min(100vw, 1024px);
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 47%, rgba(255,255,255,0.08), transparent 19%),
        radial-gradient(circle at 50% 72%, rgba(255,255,255,0.04), transparent 18%),
        linear-gradient(#151716, #101211 70%, #0d0e0e);
    }

     .entry-link:hover .poster,
    .entry-link:focus-visible .poster {
      filter: brightness(1.08);
      transform: scale(1.01);
    }
    
    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 22%, rgba(255,255,255,0.035), transparent 20%),
        radial-gradient(circle at 78% 25%, rgba(255,255,255,0.025), transparent 20%),
        repeating-radial-gradient(circle at 45% 40%, rgba(255,255,255,0.022) 0 1px, transparent 1px 9px);
      opacity: 0.35;
      mix-blend-mode: screen;
    }

    .scene {
      position: absolute;
      inset: 0;
      top: 120px;
    }

    /* Crescent moon */
    .moon {
      position: absolute;
      left: 50%;
      top: 72px;
      width: 320px;
      height: 320px;
      transform: translateX(-50%) rotate(-18deg);
      border-radius: 50%;
      background:
        radial-gradient(circle at 40% 45%, rgba(255,255,255,0.98), rgba(245,245,240,0.95) 35%, rgba(215,215,205,0.94) 61%, rgba(255,255,255,0.98) 100%);
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.22));
    }

    .moon::before {
      content: "";
      position: absolute;
      left: 105px;
      top: -10px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: #151716;
      box-shadow: inset 20px 0 30px rgba(0,0,0,0.18);
    }

    .moon::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 28%, rgba(100,100,100,0.20) 0 5px, transparent 6px),
        radial-gradient(circle at 28% 42%, rgba(90,90,90,0.18) 0 8px, transparent 9px),
        radial-gradient(circle at 42% 56%, rgba(100,100,100,0.18) 0 6px, transparent 7px),
        radial-gradient(circle at 24% 61%, rgba(120,120,120,0.16) 0 4px, transparent 5px),
        radial-gradient(circle at 52% 70%, rgba(80,80,80,0.15) 0 7px, transparent 8px);
      opacity: 0.8;
      clip-path: circle(50% at 50% 50%);
    }

    /* Ground mist */
    .mist {
      position: absolute;
      left: 50%;
      top: 430px;
      width: 460px;
      height: 65px;
      transform: translateX(-50%);
      opacity: 0.58;
      background:
        radial-gradient(ellipse at 18% 55%, rgba(245,245,245,0.24), transparent 46%),
        radial-gradient(ellipse at 50% 45%, rgba(245,245,245,0.42), transparent 44%),
        radial-gradient(ellipse at 82% 55%, rgba(245,245,245,0.24), transparent 46%),
        linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 18%, rgba(255,255,255,0.20) 50%, rgba(255,255,255,0.12) 82%, transparent 100%);
      filter: blur(4px);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 18%, black 82%, transparent 100%);
      mask-image: linear-gradient(90deg, transparent 0%, black 18%, black 82%, transparent 100%);
    }

    .ground-line {
      position: absolute;
      left: 50%;
      top: 492px;
      width: 820px;
      height: 2px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 20%, rgba(255,255,255,0.72) 50%, rgba(255,255,255,0.18) 80%, transparent 100%);
      opacity: 0.75;
    }

    /* Wordmark */
    .title {
      position: absolute;
      left: 0;
      right: 0;
      top: 612px;
      text-align: center;
      color: #f7f7f4;
      font-size: clamp(3.7rem, 8vw, 6rem);
      line-height: 1;
      letter-spacing: 0.03em;
      font-variant: small-caps;
      text-shadow: 0 2px 1px rgba(0,0,0,0.8), 0 0 8px rgba(255,255,255,0.12);
    }

    .title span {
      display: inline-block;
      margin: 0 0.18em;
    }

    .star {
      position: absolute;
      left: 50%;
      top: 778px;
      width: 14px;
      height: 14px;
      transform: translateX(-50%) rotate(45deg);
      background: #f5f5f0;
      clip-path: polygon(50% 0, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0 50%, 37% 37%);
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.55));
    }

    @media (max-width: 700px) {
      .scene { transform: scale(0.78); transform-origin: 50% 0; }
      .title { top: 58%; }
      .star { top: 70%; }
    }
  </style>
</head>
<body>
<a class="entry-link" href="home.html" aria-label="Enter portfolio">
  <main class="poster" aria-label="Eidolon Sleep black and white crescent moon">
    <section class="scene">
      <div class="moon"></div>


      <div class="mist"></div>
      <div class="ground-line"></div>
    </section>

    <h1 class="title"><span>Eidolon</span> <span>Sleep</span></h1>
    <div class="star"></div>
  </main>
</a>
</body>
</html>
